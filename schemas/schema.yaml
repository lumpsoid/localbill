$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
additionalProperties: false

required:
  - date
  - name
  - retailer
  - quantity
  - unit_price
  - price_total
  - currency
  - country

properties:
  date:
    type: string
    format: date-time

  name:
    type: string
    minLength: 1

  retailer:
    type: string
    minLength: 1

  quantity:
    type: number
    minimum: 0

  unit_price:
    type: number
    minimum: 0

  price_total:
    type: number
    minimum: 0

  currency:
    type: string
    pattern: "^[A-Z]{3}$"

  country:
    type: string
    minLength: 1

  link:
    type: string
    format: uri

  tags:
    type: array
    items:
      type: string
    uniqueItems: true

  notes:
    type: string

  exchange:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - ecurrency
        - unit_price
        - total_price
        - exchange_rate
      properties:
        ecurrency:
          type: string
          pattern: "^[A-Z]{3}$"
        unit_price:
          type: number
          minimum: 0
        total_price:
          type: number
          minimum: 0
        exchange_rate:
          type: number
          minimum: 0

  fees:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - fee
        - amount
        - currency
      properties:
        fee:
          type: string
        description:
          type: string
        amount:
          type: number
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
